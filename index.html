<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Subasta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #080503; }
    body {
      color: #ccc;
      font-family: 'Jost', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }
    input, button, textarea { font-family: inherit; }
    button { cursor: pointer; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0a0500; }
    ::-webkit-scrollbar-thumb { background: #2a1800; border-radius: 3px; }
    ::selection { background: rgba(218,165,32,0.25); }

    @keyframes fadeIn    { from { opacity:0 }            to { opacity:1 } }
    @keyframes fadeInUp  { from { opacity:0; transform:translateY(14px) } to { opacity:1; transform:translateY(0) } }
    @keyframes pulse     { 0%,100% { opacity:1 }  50% { opacity:0.45 } }
    @keyframes shimmer   {
      0%   { background-position: -200% center }
      100% { background-position:  200% center }
    }

    /* Gold shimmer on main title */
    .gold-shimmer {
      background: linear-gradient(90deg, #B8860B 0%, #FFD700 40%, #DAA520 60%, #B8860B 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="gamedata.js"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="invest.jsx"></script>
  <script type="text/babel" src="auction.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
